name: 每日定时抓取IPO真实行情数据

on:
  schedule:
    # 每天凌晨 2 点（北京时间上午 10 点）自动触发
    - cron: '0 2 * * *'
  workflow_dispatch: # 允许手动点击触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # 🟢 核心升级：由 @v3 升级到最新的 @v4，彻底消除 Node.js 弃用警告
    - name: 1. 检查并载入仓库代码架构
      uses: actions/checkout@v4

    # 🟢 核心升级：由 @v4 升级到最新的 @v5，完美适配最新云端环境
    - name: 2. 安装 Python 高精洗数环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 🤖 关键执行步：如果这里还报 code 2，请务必检查你的仓库根目录下有没有 scraper.py
    - name: 3. 开机执行 scraper 脚本抓取接口
      run: python scraper.py

    - name: 4. 机器人自动打包数据并向你的仓库提交覆盖
      run: |
        git config --global user.name "GitHub Action Scraper"
        git config --global user.email "actions@github.com"
        git add ipo_data.json
        git commit -m "🤖 机器人：自动同步最新全网待上市股票行情指标" || echo "今天接口数据无变动"
        git push
