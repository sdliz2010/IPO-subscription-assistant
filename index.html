<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Manager IPO Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-mono tracking-tight selection:bg-indigo-500/40">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 本地高仿真兜底数据
        const BASE_DATA = [
          { id: 'b-1', name: '大盘初始化中...', ticker: '000000.SH', market: 'A', industry: '通用科技', priceRange: '0.00 CNY', minEntry: '0 CNY', status: 'subscription', oversubscribed: 1.0, cornerstones: '无', sponsor: '无', sponsorSuccessRate: 90, rating: 'A', valuationPE: 20, industryPE: 25, freezeDays: 5, summary: '等待 Actions 定时任务激活送货...' }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState('optimizer'); // 默认进入精算配置页
          const [marketFilter, setMarketFilter] = useState('ALL');
          const [ipoData, setIpoData] = useState(BASE_DATA);
          const [selectedIpo, setSelectedIpo] = useState(BASE_DATA[0]);

          // 机构杠杆效率测算状态
          const [managerPrincipal, setManagerPrincipal] = useState(1000000); // 默认100万可用本金
          const [marginLeverage, setMarginLeverage] = useState(20); // 机构高频20倍孖展
          const [fundingRate, setFundingRate] = useState(3.5); // 融资年化利息
          const [firstDayGainExpect, setFirstDayGainExpect] = useState(30); // 预期涨幅

          // 自动化读取定时更新的真实数据包
          useEffect(() => {
            fetch('./ipo_data.json?r=' + Math.random())
              .then(res => res.json())
              .then(data => {
                if(data && data.length > 0) {
                  setIpoData(data);
                  setSelectedIpo(data[0]);
                }
              }).catch(err => console.log("等待云端机器人初次推送数据..."));
          }, []);

          // 核心风控引擎：基于清洗后的多组核心因子自动下达投资军令
          const quantitativeVerdict = useMemo(() => {
            if (!selectedIpo) return { signal: 'HOLD', color: 'text-slate-400', desc: '无目标头寸' };
            const peGap = selectedIpo.industryPE - selectedIpo.valuationPE;
            
            if (selectedIpo.rating === 'S' || (peGap > 10 && selectedIpo.sponsorSuccessRate >= 90)) {
                return { signal: 'STRONG BUY (大额重配)', color: 'text-purple-400 bg-purple-500/10 border-purple-500/20', strategy: '启动最大化孖展杠杆（20x/50x）抢配额，博取首日高爆发溢价。' };
            } else if (peGap > 0 && selectedIpo.oversubscribed > 15) {
                return { signal: 'CASH ONLY (现金防御)', color: 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20', strategy: '估值合理但人气未达极致暴利。建议多账户现金“一手策略”参与，规避高额利息沉没损耗。' };
            } else {
                return { signal: 'PASS (严格回避)', color: 'text-rose-400 bg-rose-500/10 border-rose-500/20', strategy: '发行市盈率透支或保荐机构历史护盘率过低。破发概率高，不建议占用基金经理仓位。' };
            }
          }, [selectedIpo]);

          // 机构孖展利息拖累与保本平衡线高精算逻辑
          const institutionalMath = useMemo(() => {
            if (!selectedIpo) return {};
            const totalFinancing = managerPrincipal * marginLeverage; // 总名义申购货值
            const borrowedCapital = Math.max(0, totalFinancing - managerPrincipal); // 向券商融入的资金
            
            // 动态精算利息拖累 Cost
            const interestCost = (borrowedCapital * (fundingRate / 100) * selectedIpo.freezeDays) / 365;
            const frictionalCost = interestCost + (selectedIpo.market === 'HK' ? 100 : 0); // 包含手续费

            // 动态推算回拨机制中签率 Tier
            let estimatedAllotRate = 0.5; // A股底仓默认抽签率
            if (selectedIpo.market === 'HK') {
                // 港股红鞋回拨梯度 math
                estimatedAllotRate = selectedIpo.oversubscribed > 100 ? 2.5 : selectedIpo.oversubscribed > 50 ? 8.0 : 18.0;
            }
            
            const expectedAllotmentValue = totalFinancing * (estimatedAllotRate / 100); // 预期能够获配的真实持仓货值
            const breakEvenJump = expectedAllotmentValue > 0 ? ((frictionalCost / expectedAllotmentValue) * 100).toFixed(2) : '0.00';
            const netStrategyProfit = (expectedAllotmentValue * (firstDayGainExpect / 100)) - frictionalCost;

            return {
                totalFinancing, borrowedCapital,
                interestCost: interestCost.toFixed(0),
                frictionalCost: frictionalCost.toFixed(0),
                estimatedAllotRate,
                expectedAllotmentValue: expectedAllotmentValue.toFixed(0),
                breakEvenJump,
                netStrategyProfit: netStrategyProfit.toFixed(0),
                roi: managerPrincipal > 0 ? ((netStrategyProfit / managerPrincipal) * 100).toFixed(1) : '0.0'
              };
          }, [selectedIpo, managerPrincipal, marginLeverage, fundingRate, firstDayGainExpect]);

          return (
            <div className="min-h-screen bg-slate-950 flex flex-col p-4 md:p-8">
              
              {/* 页头看板：纯灰冷淡专业流 */}
              <header className="max-w-7xl w-full mx-auto border-b border-slate-800 pb-6 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                  <h1 className="text-xl font-black tracking-wider text-white">QUANT IPO TERMINAL <span className="text-xs font-normal text-indigo-400 bg-indigo-500/10 px-2.5 py-0.5 rounded-md border border-indigo-500/20 ml-2">高级投资经理决策端</span></h1>
                  <p className="text-xs text-slate-400 mt-1">实时追踪即将挂牌资产 · 多因子核心精算风控模型</p>
                </div>
                <div className="flex bg-slate-900 p-0.5 rounded-lg border border-slate-800 text-xs">
                  <button onClick={() => setActiveTab('optimizer')} className={`px-4 py-2 rounded-md font-bold ${activeTab === 'optimizer' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400'}`}>⚖️ 策略精算与风控</button>
                  <button onClick={() => setActiveTab('guides')} className={`px-4 py-2 rounded-md font-bold ${activeTab === 'guides' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400'}`}>📚 打新风控红线</button>
                </div>
              </header>

              <main className="max-w-7xl w-full mx-auto flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                
                {/* 左五栏：新股高精流水线名录 */}
                <div className="lg:col-span-4 space-y-3">
                  <div className="bg-slate-900 p-3 rounded-xl border border-slate-800 flex justify-between items-center text-xs">
                    <span className="text-slate-400 font-bold">待挂牌资产池清单</span>
                    <div className="flex gap-2">
                      <button onClick={()=>setMarketFilter('ALL')} className={`px-2 py-0.5 rounded ${marketFilter==='ALL'?'bg-indigo-600 text-white':'text-slate-400'}`}>全部</button>
                      <button onClick={()=>setMarketFilter('A')} className={`px-2 py-0.5 rounded ${marketFilter==='A'?'bg-indigo-600 text-white':'text-slate-400'}`}>A股</button>
                      <button onClick={()=>setMarketFilter('HK')} className={`px-2 py-0.5 rounded ${marketFilter==='HK'?'bg-indigo-600 text-white':'text-slate-400'}`}>港股</button>
                    </div>
                  </div>

                  {ipoData.filter(x=>marketFilter==='ALL' || x.market===marketFilter).map(ipo => {
                    const isSelected = selectedIpo.id === ipo.id;
                    const peDelta = ipo.industryPE - ipo.valuationPE;
                    return (
                      <div 
                        key={ipo.id} 
                        onClick={() => setSelectedIpo(ipo)}
                        className={`p-4 rounded-xl border transition-all cursor-pointer ${isSelected ? 'bg-slate-900 border-indigo-500 shadow-xl' : 'bg-slate-950 border-slate-900 hover:border-slate-800'}`}
                      >
                        <div className="flex justify-between items-start">
                          <div>
                            <h3 className="text-sm font-black text-slate-100 flex items-center gap-2">{ipo.name} <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse" /></h3>
                            <p className="text-[11px] font-mono text-indigo-400 mt-1">{ipo.ticker} · {ipo.industry}</p>
                          </div>
                          <span className={`text-[10px] font-extrabold font-mono px-2 py-0.5 rounded ${peDelta > 0 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                            {peDelta > 0 ? `折让 ${Math.abs(peDelta).toFixed(0)}%` : `溢价 ${Math.abs(peDelta).toFixed(0)}%`}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 右八栏：核心决策中枢面板 */}
                {activeTab === 'optimizer' && selectedIpo && (
                  <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-12 gap-6 animate-fadeIn">
                    
                    {/* 上排：大字号因子指标卡（秒级对齐状况） */}
                    <div className="md:col-span-12 bg-slate-900 p-6 rounded-2xl border border-slate-800 grid grid-cols-2 md:grid-cols-4 gap-6">
                      <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-900">
                        <span className="text-slate-500 text-xs block">个股估值市盈率</span>
                        <span className="text-xl font-bold text-slate-100 block mt-1 font-mono">{selectedIpo.valuationPE > 0 ? `${selectedIpo.valuationPE}x` : '未盈利'}</span>
                        <span className="text-[10px] text-slate-500 block mt-1">同业中枢: {selectedIpo.industryPE}x</span>
                      </div>
                      <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-900">
                        <span className="text-slate-500 text-xs block">全网认购情绪</span>
                        <span className="text-xl font-bold text-amber-400 block mt-1 font-mono">{selectedIpo.oversubscribed} 倍</span>
                        <span className="text-[10px] text-slate-500 block mt-1">预计触发现金回拨</span>
                      </div>
                      <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-900">
                        <span className="text-slate-500 text-xs block">保荐机构历史胜率</span>
                        <span className="text-xl font-bold text-emerald-400 block mt-1 font-mono">{selectedIpo.sponsorSuccessRate}%</span>
                        <span className="text-[10px] text-slate-500 block mt-1">绿鞋平盘托底能力强</span>
                      </div>
                      <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-900">
                        <span className="text-slate-500 text-xs block">头寸沉没冻结天数</span>
                        <span className="text-xl font-bold text-slate-100 block mt-1 font-mono">{selectedIpo.freezeDays} 天</span>
                        <span className="text-[10px] text-slate-500 block mt-1">占用机构周转效率</span>
                      </div>
                    </div>

                    {/* 中左：投资经理可控输入区（调仓杠杆模拟） */}
                    <div className="md:col-span-5 bg-slate-900 p-5 rounded-2xl border border-slate-800 flex flex-col gap-4">
                      <h3 className="text-xs font-bold text-indigo-400 uppercase tracking-wider border-b border-slate-800 pb-2">📂 可调控头寸参数</h3>
                      <div className="space-y-4 text-xs">
                        <div>
                          <label className="text-slate-400 block mb-1">拟调拨可用本金 (Principal):</label>
                          <input type="number" value={managerPrincipal} onChange={e=>setManagerPrincipal(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white font-mono font-bold" />
                        </div>
                        <div>
                          <label className="text-slate-400 block mb-1">拟启用孖展融资杠杆 (Leverage):</label>
                          <select value={marginLeverage} onChange={e=>setMarginLeverage(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white font-bold">
                            <option value="1">1x (纯现金一首防御)</option>
                            <option value="10">10x (机构基础额度)</option>
                            <option value="20">20x (高频大额杠杆)</option>
                          </select>
                        </div>
                        <div>
                          <label className="text-slate-400 block mb-1">日历计息年化利率 (%):</label>
                          <input type="number" step="0.1" value={fundingRate} onChange={e=>setFundingRate(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white font-mono" />
                        </div>
                        <div>
                          <label className="text-slate-400 block mb-1">预期上市首日理论溢价 (%):</label>
                          <input type="number" value={firstDayGainExpect} onChange={e=>setFirstDayGainExpect(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white font-mono" />
                        </div>
                      </div>
                    </div>

                    {/* 中右：量化决策与利息拖累精算报告 */}
                    <div className="md:col-span-7 flex flex-col gap-4">
                      
                      {/* 投资决策总指挥信号（一秒做出开仓判定） */}
                      <div className={`p-5 rounded-2xl border ${quantitativeVerdict.color}`}>
                        <span className="text-[10px] font-bold uppercase tracking-widest block">SYSTEM VERDICT / 自动量化军令</span>
                        <span className="text-lg font-black block mt-1 tracking-tight font-mono">{quantitativeVerdict.signal}</span>
                        <p className="text-xs text-slate-300 mt-2 leading-relaxed font-light">{quantitativeVerdict.strategy}</p>
                      </div>

                      {/* 资本效率与利息摩擦精算单 */}
                      <div className="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex-1 flex flex-col justify-between">
                        <div className="space-y-2.5 text-xs">
                          <div className="flex justify-between">
                            <span className="text-slate-500">放大后申购名义货值:</span>
                            <span className="text-slate-200 font-mono">¥ {institutionalMath.totalFinancing ? institutionalMath.totalFinancing.toLocaleString() : 0}</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-slate-500">系统估算加权中签率:</span>
                            <span className="text-indigo-400 font-mono font-bold">{institutionalMath.estimatedAllotRate}% (Clawback Math)</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-slate-500">预估真实获配持仓货值:</span>
                            <span className="text-slate-200 font-mono font-bold">¥ {institutionalMath.expectedAllotmentValue ? Number(institutionalMath.expectedAllotmentValue).toLocaleString() : 0}</span>
                          </div>
                          <div className="flex justify-between border-t border-slate-800 pt-2 text-rose-400">
                            <span>硬性沉没利息与成本摩擦:</span>
                            <span className="font-mono">¥ {institutionalMath.frictionalCost}</span>
                          </div>
                          <div className="flex justify-between text-amber-400 font-bold">
                            <span>保本平衡需要首日涨幅线:</span>
                            <span className="font-mono">{institutionalMath.breakEvenJump} %</span>
                          </div>
                        </div>

                        {/* 最终风险敞口预期红利 */}
                        <div className="border-t border-slate-800 pt-4 mt-4 flex justify-between items-center">
                          <div>
                            <span className="text-[10px] text-slate-500 block">扣除利息折旧后预期净利润</span>
                            <span className={`text-2xl font-black font-mono tracking-tight mt-0.5 block ${Number(institutionalMath.netStrategyProfit) >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                              {Number(institutionalMath.netStrategyProfit) >= 0 ? '+' : ''}{institutionalMath.netStrategyProfit ? Number(institutionalMath.netStrategyProfit).toLocaleString() : 0}
                            </span>
                          </div>
                          <div className="bg-slate-950 px-4 py-2 rounded-xl border border-slate-800 text-right">
                            <span className="text-[9px] text-slate-500 block">净可用ROI</span>
                            <span className="text-emerald-400 font-bold font-mono text-sm">{institutionalMath.roi} %</span>
                          </div>
                        </div>

                      </div>
                    </div>

                    {/* 下排：嵌入直连级TradingView真实走势，用于辅助核对二级同业技术面 */}
                    <div className="md:col-span-12 bg-slate-900 p-4 rounded-2xl border border-slate-800">
                        <span className="text-[11px] font-bold text-slate-500 block mb-2">📺 二级市场大盘同业走势联动校验 (TradingView Engine)</span>
                        <iframe src={`https://s.tradingview.com/widgetembed/?symbol=${selectedIpo.ticker.includes('.SH')?'SSE':'SZSE'}:${selectedIpo.ticker.split('.')[0]}&interval=D&theme=dark&locale=zh_CN`} width="100%" height="200" frameBorder="0" scrolling="no" className="rounded-xl"></iframe>
                    </div>

                  </div>
                )}

                {/* ==================== 标签 2: 投资风控百科 ==================== */}
                {activeTab === 'guides' && (
                  <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-6 animate-fadeIn">
                    {STRATEGY_GUIDES.map((g,i)=>(
                      <div key={i} className="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col gap-2">
                        <span className="text-[10px] bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-2 py-0.5 rounded font-bold w-max">{g.category}</span>
                        <h4 className="text-sm font-bold text-white mt-1">{g.title}</h4>
                        <p className="text-xs text-slate-400 leading-relaxed font-light mt-2">{g.content}</p>
                      </div>
                    ))}
                  </div>
                )}

              </main>

              <footer className="max-w-7xl w-full mx-auto border-t border-slate-900 mt-12 pt-4 text-center text-[10px] text-slate-600">
                © 2026 QUANT IPO STUDIO · FOR PROFESSIONAL INVESTMENT MANAGERS ONLY · MARKET RISK DISCLAIMER APPLIES.
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
