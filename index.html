<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO 简研</title>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入高级无衬线字体，增强冷淡风质感 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-[#fafafa] text-[#1a1a1a]">
    <!-- 网页挂载根节点 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // 精简、干净的内置投研数据（后续直接在这里手动修改即可）
        const IPO_DATA = [
          {
            id: '1',
            name: '长鑫科技',
            ticker: '688825.SH',
            market: 'A股科创板',
            industry: '半导体存储',
            price: '8.66 CNY',
            entry: '4,330 CNY',
            status: 'subscription', // subscription=招股中, upcoming=待招股, listed=已上市
            oversub: '852.4',
            rating: 'S',
            summary: '国内 DRAM 存储芯片绝对龙头。发行定价极为克制，大基金三期重仓注资，具备极高的安全边际与中签溢价空间。'
          },
          {
            id: '2',
            name: '托伦斯精密',
            ticker: '301583.SZ',
            market: 'A股创业板',
            industry: '半导体零部件',
            price: '18.20 CNY',
            entry: '9,100 CNY',
            status: 'listed',
            oversub: '1450.0',
            rating: 'S',
            summary: '半导体精密制造明星新股。上市表现极为亮眼，单签浮盈丰厚，显著激活了科技板块的打新情绪。'
          },
          {
            id: '3',
            name: 'Momenta',
            ticker: '06880.HK',
            market: '港股配售',
            industry: '自动驾驶 AI',
            price: '295.60 HKD',
            entry: '5,912 HKD',
            status: 'subscription',
            oversub: '42.8',
            rating: 'A',
            summary: '头部自动驾驶独角兽。上汽、奔驰与腾讯深度联合基石认购（超52%），红鞋机制下建议多账户现金一首打法。'
          },
          {
            id: '4',
            name: '晶合集成',
            ticker: '02249.HK',
            market: '港股配售',
            industry: '晶圆代工',
            price: '32.30 HKD',
            entry: '6,460 HKD',
            status: 'listed',
            oversub: '15.6',
            rating: 'B',
            summary: '成熟制程晶圆代工企业。行业估值基本合理，缺乏爆款故事，首日走势平稳，适合防御性观察。'
          }
        ];

        function App() {
          const [marketFilter, setMarketFilter] = useState('ALL');
          const [selectedIpo, setSelectedIpo] = useState(IPO_DATA[0]);

          // 简易快捷收益估算状态
          const [calcGain, setCalcFirstDayGain] = useState(25);

          // 过滤逻辑
          const filteredData = useMemo(() => {
            return IPO_DATA.filter(item => {
              if (marketFilter === 'ALL') return true;
              if (marketFilter === 'A') return item.market.includes('A股');
              if (marketFilter === 'HK') return item.market.includes('港股');
              return true;
            });
          }, [marketFilter]);

          // 计算一手中签期望纯收益
          const expectedProfit = useMemo(() => {
            if (!selectedIpo) return 0;
            const entryValue = parseFloat(selectedIpo.entry.replace(/[^0-9.]/g, '')) || 0;
            return ((entryValue * (calcGain / 100))).toFixed(0);
          }, [selectedIpo, calcGain]);

          return (
            <div className="max-w-5xl mx-auto px-6 py-12 md:py-20 flex flex-col min-h-screen">
              
              {/* HEADER：极简无修饰页头 */}
              <header className="mb-12 border-b border-gray-100 pb-8 flex justify-between items-baseline">
                <div>
                  <h1 className="text-xl font-medium tracking-tight text-gray-900">IPO STUDIO</h1>
                  <p className="text-xs text-gray-400 mt-1 font-light tracking-wide">新股申购清爽度投研面板</p>
                </div>
                
                {/* 市场切换：冷淡风小按钮 */}
                <div className="flex gap-4 text-xs font-light tracking-wide text-gray-400">
                  <button onClick={() => setMarketFilter('ALL')} className={`transition-colors ${marketFilter === 'ALL' ? 'text-gray-900 font-normal underline underline-offset-4' : 'hover:text-gray-600'}`}>全部</button>
                  <button onClick={() => setMarketFilter('A')} className={`transition-colors ${marketFilter === 'A' ? 'text-gray-900 font-normal underline underline-offset-4' : 'hover:text-gray-600'}`}>A股打新</button>
                  <button onClick={() => setMarketFilter('HK')} className={`transition-colors ${marketFilter === 'HK' ? 'text-gray-900 font-normal underline underline-offset-4' : 'hover:text-gray-600'}`}>港股配售</button>
                </div>
              </header>

              {/* MAIN CONTENT：双栏错落布局 */}
              <main className="flex-1 grid grid-cols-1 md:grid-cols-12 gap-12 items-start">
                
                {/* 左栏：个股精简名录 (占 5 栏) */}
                <div className="md:col-span-5 space-y-3">
                  {filteredData.map(ipo => {
                    const isSelected = selectedIpo.id === ipo.id;
                    return (
                      <div 
                        key={ipo.id}
                        onClick={() => setSelectedIpo(ipo)}
                        className={`p-4 rounded-lg transition-all duration-200 cursor-pointer border ${
                          isSelected 
                            ? 'bg-white border-gray-200 shadow-[0_4px_12px_rgba(0,0,0,0.02)]' 
                            : 'border-transparent hover:bg-gray-100/60'
                        }`}
                      >
                        <div className="flex justify-between items-center">
                          <div>
                            <div className="flex items-center gap-2">
                              <h3 className="text-sm font-medium text-gray-900">{ipo.name}</h3>
                              {/* 状态点指示器 */}
                              <span className={`w-1.5 h-1.5 rounded-full ${ipo.status === 'subscription' ? 'bg-emerald-400' : 'bg-gray-300'}`} />
                            </div>
                            <p className="text-[11px] font-mono text-gray-400 mt-0.5 tracking-wide">{ipo.ticker} · {ipo.industry}</p>
                          </div>
                          
                          <div className="text-right">
                            <span className="text-xs font-mono text-gray-800 tracking-tight">{ipo.price}</span>
                            <span className="block text-[9px] font-light text-gray-400 tracking-wider mt-0.5">{ipo.market}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 右栏：沉浸式详情与速算 (占 7 栏) */}
                <div className="md:col-span-7 bg-white border border-gray-100 rounded-xl p-8 shadow-[0_8px_24px_rgba(0,0,0,0.01)] sticky top-12">
                  {selectedIpo ? (
                    <div className="space-y-8 animate-fadeIn">
                      
                      {/* 标题区 */}
                      <div className="border-b border-gray-50 pb-5 flex justify-between items-start">
                        <div>
                          <h2 className="text-lg font-medium text-gray-900">{selectedIpo.name}</h2>
                          <p className="text-xs text-gray-400 font-mono mt-0.5">{selectedIpo.ticker} / {selectedIpo.market}</p>
                        </div>
                        <div className="text-right">
                          <span className="text-xs font-light text-gray-400">系统评级</span>
                          <span className="block text-2xl font-light font-mono text-gray-900 tracking-tighter leading-none mt-1">{selectedIpo.rating}</span>
                        </div>
                      </div>

                      {/* 数据矩阵 */}
                      <div className="grid grid-cols-2 gap-y-5 gap-x-4 text-xs font-light">
                        <div>
                          <span className="text-gray-400 block">发行定价</span>
                          <span className="text-gray-900 font-mono mt-1 block text-sm">{selectedIpo.price}</span>
                        </div>
                        <div>
                          <span className="text-gray-400 block">一手最低门槛 (入场费)</span>
                          <span className="text-gray-900 font-mono mt-1 block text-sm">{selectedIpo.entry}</span>
                        </div>
                        <div>
                          <span className="text-gray-400 block">当前超额认购</span>
                          <span className="text-gray-900 font-mono mt-1 block text-sm">{selectedIpo.oversub = 'N/A' ? `${selectedIpo.oversub} 倍` : '暂无数据'}</span>
                        </div>
                        <div>
                          <span className="text-gray-400 block">核心赛道</span>
                          <span className="text-gray-900 mt-1 block text-sm">{selectedIpo.industry}</span>
                        </div>
                      </div>

                      {/* 投研摘要 */}
                      <div className="space-y-2">
                        <span className="text-xs font-light text-gray-400 block">简研诊断结论</span>
                        <p className="text-xs text-gray-600 leading-relaxed font-light">{selectedIpo.summary}</p>
                      </div>

                      {/* 极简速算器：冷淡而实用 */}
                      <div className="bg-[#fcfcfc] border border-gray-100/70 rounded-lg p-4 space-y-4">
                        <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                          <span className="text-xs font-light text-gray-500">一手估算涨幅偏好 (%)</span>
                          <div className="flex items-center gap-2">
                            <input 
                              type="range" 
                              min="-20" 
                              max="150" 
                              value={calcGain} 
                              onChange={(e) => setCalcFirstDayGain(Number(e.target.value))}
                              className="w-28 h-1 bg-gray-200 appearance-none rounded-lg accent-gray-900 cursor-pointer"
                            />
                            <span className="text-xs font-mono font-medium text-gray-800 w-10 text-right">{calcGain > 0 ? `+${calcGain}` : calcGain}%</span>
                          </div>
                        </div>
                        
                        <div className="flex justify-between items-baseline pt-2 border-t border-gray-100">
                          <span className="text-xs font-light text-gray-400">一手持仓预期损益贡献</span>
                          <span className={`text-xl font-mono tracking-tight font-medium ${Number(expectedProfit) >= 0 ? 'text-gray-900' : 'text-rose-500'}`}>
                            {Number(expectedProfit) >= 0 ? '+' : ''}{Number(expectedProfit).toLocaleString()} 
                            <span className="text-xs font-light text-gray-400 ml-1">{selectedIpo.market.includes('港股') ? 'HKD' : 'CNY'}</span>
                          </span>
                        </div>
                      </div>

                    </div>
                  ) : (
                    <div className="text-center py-20 text-xs text-gray-400 font-light italic">请在左侧点选目标个股查看深度简研</div>
                  )}
                </div>

              </main>

              {/* FOOTER */}
              <footer className="mt-20 border-t border-gray-50 pt-6 text-center text-[10px] text-gray-300 font-light tracking-wider">
                  © 2026 IPO STUDIO · LESS IS MORE.
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
