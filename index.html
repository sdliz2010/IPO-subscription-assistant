<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO 智联自动投研终端</title>
    <!-- 1. 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 2. 引入 Babel（解析 JSX 语法） -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. 引入 Tailwind CSS（网页样式） -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-955 bg-slate-950 text-slate-100 flex flex-col font-sans selection:bg-indigo-500/30">
    <!-- 网页挂载容器 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 💡 专家级设计：在 Actions 机器人还没送货前，提供完美的本地兜底仿真展示数据
        const BACKUP_IPO_DATA = [
          {
            id: 'backup-1',
            name: '长鑫科技 (数据载入中)',
            ticker: '688825.SH',
            market: 'A',
            industry: '半导体存储芯片',
            priceRange: '8.66 CNY',
            minEntry: '4,330 CNY',
            status: 'subscription', 
            endDate: '2026-07-23',
            listDate: '2026-07-31',
            oversubscribed: 852.4, 
            cornerstones: '大基金三期注资',
            sponsor: '中信证券',
            sponsorSuccessRate: 95, 
            rating: 'S',
            valuationPE: 28.4,
            freezeDays: 8,
            summary: '大盘初始化中。这部分是机器人送货前的仿真展示区域。一旦云端Actions定时任务触发，这里将自动展示真实的实时待上市名录。'
          }
        ];

        const STRATEGY_GUIDES = [
          { title: '港股打新黄金法则与红鞋制度', category: '港股规则', content: '港股分配机制遵循“一户一首优先”的红鞋制度，即尽量让每一个参与申购的账户都能至少分到一手。因此最核心的策略是【多账户打法】。' },
          { title: 'A股科创板与创业板市值打新指引', category: 'A股规则', content: 'A股打新属于“底仓套利”，申购时不需要冻结资金，中签后再缴款。但申购额度与前20个交易日的日均非限售A股市值挂钩（满1万元起算）。' }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard'); 
          const [marketFilter, setMarketFilter] = useState('ALL'); 
          const [searchTerm, setSearchTerm] = useState('');
          const [ipoData, setIpoData] = useState(BACKUP_IPO_DATA);
          const [selectedIpo, setSelectedIpo] = useState(BACKUP_IPO_DATA[0]);
          const [dataSource, setDataSource] = useState('沙盒兜底');

          // 计算模拟器状态
          const [calcMarket, setCalcMarket] = useState('HK'); 
          const [calcPrincipal, setCalcPrincipal] = useState(50000); 
          const [calcLeverage, setCalcLeverage] = useState(10); 
          const [calcSubFee, setCalcSubFee] = useState(100); 
          const [calcInterestRate, setCalcInterestRate] = useState(3.8); 
          const [calcInterestDays, setCalcInterestDays] = useState(6); 
          const [calcFirstDayGain, setCalcFirstDayGain] = useState(25); 
          const [calcAllotmentRate, setCalcAllotmentRate] = useState(20); 
          const [calcLotsApplied, setCalcLotsApplied] = useState(10); 
          const [calcPricePerLot, setCalcPricePerLot] = useState(4000); 

          // 智能评级状态
          const [scoreSponsor, setScoreSponsor] = useState('excellent'); 
          const [scoreCornerstone, setScoreCornerstone] = useState('strong'); 
          const [scoreValuation, setScoreValuation] = useState('discount'); 
          const [scoreSentiment, setScoreSentiment] = useState('hot'); 

          // 配置优化器状态
          const [fundSize, setFundSize] = useState(1000000); 
          const [ipoAllocRatio, setIpoAllocRatio] = useState(10); 
          const [investPreference, setInvestPreference] = useState('balanced'); 

          // 📡 核心自动化改造：网页开门时，自动读取机器人定时抓取的 JSON 真实数据包
          useEffect(() => {
            fetch('./ipo_data.json?r=' + Math.random())
              .then(res => {
                if(!res.ok) throw new Error("尚未生成自动化行情包");
                return res.json();
              })
              .then(data => {
                if (data && data.length > 0) {
                  setIpoData(data);
                  setSelectedIpo(data[0]);
                  setDataSource('Actions 机器人全自动实时流');
                }
              })
              .catch(err => {
                console.log("📡 行情网关提示：暂未读取到自动化更新文件，已启动高仿真沙盒环境：", err);
              });
          }, []);

          const filteredIpoData = useMemo(() => {
            return ipoData.filter((ipo) => {
              const matchMarket = marketFilter === 'ALL' || ipo.market.includes(marketFilter);
              const matchSearch = ipo.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                  ipo.ticker.toLowerCase().includes(searchTerm.toLowerCase());
              return matchMarket && matchSearch;
            });
          }, [ipoData, marketFilter, searchTerm]);

          const calculatorResults = useMemo(() => {
            const totalFinancing = calcPrincipal * calcLeverage; 
            const maxLots = Math.floor(totalFinancing / calcPricePerLot);
            const actualLots = Math.min(calcLotsApplied, maxLots);
            const interestCost = ((actualLots * calcPricePerLot - calcPrincipal) * (calcInterestRate / 100) * calcInterestDays) / 365;
            const nonRefundableCost = (calcMarket === 'HK' ? calcSubFee : 0) + (interestCost > 0 ? interestCost : 0);
            const valueWon = (actualLots * (calcAllotmentRate / 100)) * calcPricePerLot;
            const netProfit = (valueWon * (calcFirstDayGain / 100)) - nonRefundableCost;
            return {
              actualLots, interestCost: interestCost.toFixed(1),
              nonRefundableCost: nonRefundableCost.toFixed(1),
              valueWon: valueWon.toFixed(0), netProfit: netProfit.toFixed(1),
              roi: calcPrincipal > 0 ? ((netProfit / calcPrincipal) * 100).toFixed(1) : '0.0',
              breakEvenGain: valueWon > 0 ? ((nonRefundableCost / valueWon) * 100).toFixed(1) : '0.0'
            };
          }, [calcMarket, calcPrincipal, calcLeverage, calcSubFee, calcInterestRate, calcInterestDays, calcFirstDayGain, calcAllotmentRate, calcLotsApplied, calcPricePerLot]);

          const decisionReport = useMemo(() => {
            let score = 50; if (scoreSponsor === 'excellent') score += 20; if (scoreCornerstone === 'strong') score += 20; if (scoreValuation === 'discount') score += 10;
            let grade = score >= 80 ? 'S' : score >= 65 ? 'A' : 'B';
            return { score, grade, text: score >= 70 ? '全力参与' : '现金一首防御' };
          }, [scoreSponsor, scoreCornerstone, scoreValuation]);

          return (
            <div className="min-h-screen flex flex-col">
              <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-40 px-4">
                <div className="max-w-7xl mx-auto py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
                  <div>
                    <h1 className="text-xl font-bold text-white flex items-center gap-2">🤖 IPO 智联大盘助理 <span className="text-[10px] bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-2 py-0.5 rounded-full font-mono">{dataSource}</span></h1>
                    <p className="text-xs text-slate-400 mt-0.5">数据链路：东方财富权威接口 ➡️ Actions 定时云爬虫 ➡️ 本地大盘重绘</p>
                  </div>
                  <nav className="flex bg-slate-950 p-1 rounded-xl border border-slate-800 text-xs">
                    <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-1.5 rounded-lg font-semibold ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>📊 数据大盘</button>
                    <button onClick={() => setActiveTab('calculator')} className={`px-4 py-1.5 rounded-lg font-semibold ${activeTab === 'calculator' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>🧮 模拟精算</button>
                    <button onClick={() => setActiveTab('scorer')} className={`px-4 py-1.5 rounded-lg font-semibold ${activeTab === 'scorer' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>🎯 智能评级</button>
                  </nav>
                </div>
              </header>

              <main className="flex-1 max-w-7xl w-full mx-auto p-4 flex flex-col gap-6">
                {activeTab === 'dashboard' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2 flex flex-col gap-4">
                      <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                        <div className="flex gap-2">
                          {['ALL', 'A'].map(m => (
                            <button key={m} onClick={() => setMarketFilter(m)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${marketFilter === m ? 'bg-indigo-600 text-white' : 'bg-slate-950 text-slate-400'}`}>{m === 'ALL' ? '全部项目' : '🇨🇳 真实待上市新股'}</button>
                          ))}
                        </div>
                        <input type="text" placeholder="过滤搜索..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="bg-slate-950 border border-slate-800 rounded-lg text-xs p-1.5 focus:outline-none w-48" />
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filteredIpoData.map(ipo => (
                          <div key={ipo.id} onClick={() => setSelectedIpo(ipo)} className={`bg-slate-900 p-5 rounded-2xl border cursor-pointer transition-all ${selectedIpo.id === ipo.id ? 'border-indigo-500' : 'border-slate-800'}`}>
                            <span className="text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded font-bold">{ipo.market} | {ipo.industry}</span>
                            <h3 className="text-base font-bold text-white mt-2">{ipo.name}</h3>
                            <p className="text-xs text-indigo-400 font-mono mt-0.5">{ipo.ticker}</p>
                            <div className="mt-4 pt-4 border-t border-slate-800 flex justify-between text-xs text-slate-400">
                              <div>发行定价: <span className="text-slate-200 font-bold">{ipo.priceRange}</span></div>
                              <div>预估超购: <span className="text-amber-400 font-bold">{ipo.oversubscribed} 倍</span></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="lg:col-span-1">
                      {selectedIpo && (
                        <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col gap-5 sticky top-24">
                          <h2 className="text-lg font-bold text-white border-b border-slate-800 pb-2">{selectedIpo.name} <span className="text-xs font-mono text-indigo-400 block mt-0.5">{selectedIpo.ticker}</span></h2>
                          
                          {/* 📺 联动行情K线组件：全网直连无跨域干扰 */}
                          <div className="bg-slate-950 rounded-xl p-2.5 border border-slate-800">
                            <iframe src={`https://s.tradingview.com/widgetembed/?symbol=${selectedIpo.ticker.includes('.SH')?'SSE':'SZSE'}:${selectedIpo.ticker.split('.')[0]}&interval=D&theme=dark&locale=zh_CN`} width="100%" height="200" frameBorder="0" scrolling="no" className="rounded-lg"></iframe>
                          </div>

                          <div className="space-y-2 text-xs text-slate-300">
                            <p className="bg-slate-950 p-2 rounded flex justify-between"><span>🤝 申购代码/简称:</span><span className="font-bold text-white">{selectedIpo.ticker.split('.')[0]}</span></p>
                            <p className="bg-slate-950 p-2 rounded flex justify-between"><span>💎 行业申购指引:</span><span className="font-bold text-white">{selectedIpo.industry}</span></p>
                            <p className="bg-slate-950 p-2 rounded flex justify-between"><span>📈 建议评级级数:</span><span className="font-bold text-amber-400">{selectedIpo.rating} 级标的</span></p>
                          </div>
                          <div className="bg-indigo-950/10 border border-indigo-900/30 p-4 rounded-xl text-xs text-slate-400 leading-relaxed"><span className="font-bold text-indigo-400 block mb-1">💡 自动化个股诊断：</span>{selectedIpo.summary}</div>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {activeTab === 'calculator' && (
                  <div className="bg-slate-900 p-6 rounded-xl border border-slate-800 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-4 text-xs bg-slate-950 p-4 rounded-xl border border-slate-800">
                      <h3 className="text-sm font-bold text-indigo-400 border-b border-slate-800 pb-2">测算参数微调</h3>
                      <div>本金可用现金: <input type="number" value={calcPrincipal} onChange={e=>setCalcPrincipal(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-1.5 text-white font-mono mt-1" /></div>
                      <div>每手配售货值: <input type="number" value={calcPricePerLot} onChange={e=>setCalcPricePerLot(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-1.5 text-white font-mono mt-1" /></div>
                      <div className="grid grid-cols-2 gap-2">
                        <div>预估中签率%: <input type="number" value={calcAllotmentRate} onChange={e=>setCalcAllotmentRate(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-1 mt-1" /></div>
                        <div>预期上市涨幅%: <input type="number" value={calcFirstDayGain} onChange={e=>setCalcFirstDayGain(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-1 mt-1" /></div>
                      </div>
                    </div>
                    <div className="bg-slate-950 p-6 rounded-xl border border-slate-800 flex flex-col justify-between">
                      <h3 className="text-sm font-bold text-white border-b border-slate-800 pb-2">精算账单报告</h3>
                      <div className="space-y-2 text-xs text-slate-400 mt-2">
                        <div className="flex justify-between"><span>预计可申购规模:</span><span className="text-white font-mono">{calculatorResults.actualLots} 手</span></div>
                        <div className="flex justify-between"><span>预计获配中签货值:</span><span className="text-white font-mono">¥ {calculatorResults.valueWon}</span></div>
                        <div className="flex justify-between"><span>保本所需平衡涨幅线:</span><span className="text-amber-400 font-mono">{calculatorResults.breakEvenGain} %</span></div>
                      </div>
                      <div className="border-t border-slate-800 pt-4 mt-4 flex justify-between items-center">
                        <div><span className="text-xs text-slate-500 block">加权预估纯收益</span><span className={`text-2xl font-black font-mono ${Number(calculatorResults.netProfit)>=0?'text-emerald-400':'text-rose-500'}`}>{Number(calculatorResults.netProfit)>=0?'+':''}{calculatorResults.netProfit}</span></div>
                        <div className="bg-slate-900 px-3 py-1 rounded text-right"><span className="text-[10px] text-slate-500 block">测算回报率 ROI</span><span className="text-emerald-400 font-bold font-mono">{calculatorResults.roi}%</span></div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'scorer' && (
                  <div className="bg-slate-900 p-6 rounded-xl border border-slate-800 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div className="w-16 h-16 bg-indigo-600 rounded-xl flex flex-col items-center justify-center font-mono text-xl font-black text-white">{decisionReport.score}<span className="text-[9px] font-normal">量化分</span></div>
                    <div className="flex-1"><span className="bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 px-3 py-1 rounded font-bold text-sm">{decisionReport.grade} 级综合诊断</span><p className="text-xs text-slate-400 mt-2">基于承销商胜率、主力基石比例等多项静态因子测算，系统对该股最终给出的操作方针为：<span className="text-amber-400 font-bold">{decisionReport.text}</span>。</p></div>
                  </div>
                )}
              </main>

              <footer className="bg-slate-950 py-4 text-center text-[10px] text-slate-500 border-t border-slate-900 mt-auto">
                 © 2026 IPO 智联投研大盘系统 · 数据源东方财富API · 参与股市打新存在破发风险，入市须极度克制。
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
