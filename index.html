<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO 打新助手</title>
    <!-- 1. 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 2. 引入 Babel（解析 JSX 语法） -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. 引入 Tailwind CSS（网页样式） -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- 网页挂载容器 -->
    <div id="root"></div>

    <script type="text/babel">
        // 声明常用的 React Hook
        const { useState, useMemo, useEffect } = React;

        // 本地沙盒仿真数据（当没有配置真实 API 时作为预览）
        const INITIAL_IPO_DATA = [
          {
            id: 'a-1',
            name: '长鑫科技 (ChangXin DRAM)',
            ticker: '688825.SH',
            market: 'A',
            industry: '半导体 / 存储芯片',
            priceRange: '8.66 CNY',
            minEntry: '4,330 CNY (500股/配号)',
            status: 'subscription', 
            endDate: '2026-07-23',
            listDate: '2026-07-31',
            oversubscribed: 852.4,
            cornerstones: '大基金三期, 合肥国资 (占比 45.0%)',
            sponsor: '中信证券, 中金公司',
            sponsorSuccessRate: 95, 
            rating: 'S',
            valuationPE: 28.4,
            freezeDays: 8,
            summary: '科创板史上最大IPO！国内DRAM存储芯片绝对龙头，拟募资数百亿元，获大基金三期大力注资。'
          },
          {
            id: 'hk-1',
            name: 'Momenta 自动驾驶 (Momenta-W)',
            ticker: '06880.HK',
            market: 'HK',
            industry: '自动驾驶 / AI算法',
            priceRange: '295.60 HKD',
            minEntry: '5,912 HKD (20股/手)',
            status: 'subscription',
            endDate: '2026-07-25',
            listDate: '2026-07-31',
            oversubscribed: 42.8,
            cornerstones: '上汽集团, 奔驰, 腾讯控股 (占比 52.3%)',
            sponsor: '中金公司, 高盛, 瑞银',
            sponsorSuccessRate: 85,
            rating: 'A',
            valuationPE: 42.5,
            freezeDays: 6,
            summary: '招股中。中国头部自动驾驶独角兽。获汽车产业巨头及科技巨头深度联手基石认购，市场溢价高。'
          }
        ];

        const STRATEGY_GUIDES = [
          { title: '港股打新黄金法则与红鞋制度', category: '港股规则', content: '港股IPO分配机制遵循“一户一首优先”的红鞋制度。' },
          { title: 'A股科创板与创业板市值打新指引', category: 'A股规则', content: 'A股打新属于“无风险套利”，中签后再缴款。' },
          { title: '美股打新规则及分配机制', category: '美股规则', content: '美股IPO由上市公司、承销商和各大零售券商协议分配。' }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard'); 
          const [marketFilter, setMarketFilter] = useState('ALL'); 
          const [statusFilter, setStatusFilter] = useState('ALL'); 
          const [searchTerm, setSearchTerm] = useState('');
          const [ipoData, setIpoData] = useState(INITIAL_IPO_DATA);
          const [selectedIpo, setSelectedIpo] = useState(INITIAL_IPO_DATA[0]);
          const [toastMessage, setToastMessage] = useState(null);

          // 🔒 安全升级：将 API 密钥存储在浏览器本地，不上传至 GitHub 源码
          const [customApiKey, setCustomApiKey] = useState(localStorage.getItem('gemini_api_key') || '');

          // Live Data Integration States
          const [isSyncing, setIsSyncing] = useState(false);
          const [syncLogs, setSyncLogs] = useState([]);
          const [citations, setCitations] = useState([]);
          const [showSyncPanel, setShowSyncPanel] = useState(true);
          const [customSearchText, setCustomSearchText] = useState('');
          const [mergeMode, setMergeMode] = useState('overwrite'); 

          // Calculator States
          const [calcMarket, setCalcMarket] = useState('HK'); 
          const [calcPrincipal, setCalcPrincipal] = useState(50000); 
          const [calcLeverage, setCalcLeverage] = useState(10); 
          const [calcSubFee, setCalcSubFee] = useState(100); 
          const [calcInterestRate, setCalcInterestRate] = useState(3.8); 
          const [calcInterestDays, setCalcInterestDays] = useState(6); 
          const [calcFirstDayGain, setCalcFirstDayGain] = useState(25); 
          const [calcAllotmentRate, setCalcAllotmentRate] = useState(20); 
          const [calcLotsApplied, setCalcLotsApplied] = useState(10); 
          const [calcPricePerLot, setCalcPricePerLot] = useState(4000); 

          // Scorer States
          const [scoreSponsor, setScoreSponsor] = useState('excellent'); 
          const [scoreCornerstone, setScoreCornerstone] = useState('strong'); 
          const [scoreValuation, setScoreValuation] = useState('discount'); 
          const [scoreSentiment, setScoreSentiment] = useState('hot'); 
          const [scoreIndustry, setScoreIndustry] = useState('hotSector'); 

          // Optimizer States
          const [fundSize, setFundSize] = useState(1000000); 
          const [ipoAllocRatio, setIpoAllocRatio] = useState(10); 
          const [historyWinRate, setHistoryWinRate] = useState(85); 
          const [investPreference, setInvestPreference] = useState('balanced'); 
          const [selectedIpoIdsForOpt, setSelectedIpoIdsForOpt] = useState(['a-1', 'hk-1']); 

          const showToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(null), 3500);
          };

          const cleanJson = (text) => {
            try {
              const startIdx = text.indexOf('[');
              const endIdx = text.lastIndexOf(']');
              if (startIdx !== -1 && endIdx !== -1) return text.substring(startIdx, endIdx + 1);
              return text;
            } catch (e) { return text; }
          };

          // 📡 核心升级：接入全网真实最新新股和行情抓取流
          const runLiveSync = async (targetMarket) => {
            if (!customApiKey.trim()) {
              showToast("❌ 请先在网关配置区输入您的 Gemini API 密钥！");
              setSyncLogs(["❌ 同步终止：未检测到密钥，请在左侧『密钥配置』框中粘贴您的免费 API Key。"]);
              return;
            }

            setIsSyncing(true);
            setShowSyncPanel(true);
            setCitations([]);
            setSyncLogs([
              "🔄 启动智联数据连接...",
              `🔍 目标市场检索：[${targetMarket}] 2026最新真实招股与行情流`,
              "🌐 正在配置全球金融 Grounding 实时搜索信道...",
              "⏳ 正在通过神经元网络抓取最新公开招募行情信息(大约需要 5-10 秒，请稍候)..."
            ]);

            const systemPrompt = `你是一个顶级金融投研分析师。请借助内置的Google Search工具，检索当前最新最真实的IPO新股数据列表（包括招股价、超购倍数、代码、基石等）。必须严格按要求的JSON格式返回新股对象数组。`;
            const userQuery = `检索当前 ${targetMarket} 市场最新、最真实发行的IPO数据列表，包含超额认购倍数。`;

            const payload = {
              contents: [{ parts: [{ text: userQuery }] }],
              tools: [{ "google_search": {} }],
              systemInstruction: { parts: [{ text: systemPrompt }] },
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: {
                      "id": { "type": "STRING" },
                      "name": { "type": "STRING" },
                      "ticker": { "type": "STRING" },
                      "market": { "type": "STRING" },
                      "industry": { "type": "STRING" },
                      "priceRange": { "type": "STRING" },
                      "minEntry": { "type": "STRING" },
                      "status": { "type": "STRING" },
                      "endDate": { "type": "STRING" },
                      "listDate": { "type": "STRING" },
                      "oversubscribed": { "type": "NUMBER" },
                      "cornerstones": { "type": "STRING" },
                      "sponsor": { "type": "STRING" },
                      "sponsorSuccessRate": { "type": "NUMBER" },
                      "rating": { "type": "STRING" },
                      "valuationPE": { "type": "NUMBER" },
                      "freezeDays": { "type": "NUMBER" },
                      "summary": { "type": "STRING" }
                    },
                    "required": ["id", "name", "ticker", "market", "industry", "priceRange", "minEntry", "status", "endDate", "listDate", "oversubscribed", "cornerstones", "sponsor", "sponsorSuccessRate", "rating", "valuationPE", "freezeDays", "summary"]
                  }
                }
              }
            };

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${customApiKey}`;

            try {
              const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });

              if (!response.ok) throw new Error(`HTTP 异常: ${response.status}`);
              const jsonRes = await response.json();
              const rawText = jsonRes.candidates?.[0]?.content?.parts?.[0]?.text;
              
              if (!rawText) throw new Error("未能成功获取核心行情文本串");
              
              const parsedData = JSON.parse(cleanJson(rawText));

              setSyncLogs(prev => [...prev, `✅ 智联接入成功！成功抓取 ${parsedData.length} 条全网最新真实行情指标。`, "🎉 页面已完成实时数据重绘渲染！"]);
              
              setIpoData(parsedData);
              if (parsedData.length > 0) setSelectedIpo(parsedData[0]);
              showToast(`成功同步 ${parsedData.length} 条市场最新真实数据！`);
            } catch (err) {
              setSyncLogs(prev => [...prev, `❌ 接入阻碍: ${err.message}`, "🚨 请检查您的密钥是否正确，或网络是否通畅。已自动回滚稳定沙盒。"]);
              showToast("数据接入失败，请检查配置。");
            }
            setIsSyncing(false);
          };

          const filteredIpoData = useMemo(() => {
            return ipoData.filter((ipo) => {
              const matchMarket = marketFilter === 'ALL' || ipo.market === marketFilter;
              const matchStatus = statusFilter === 'ALL' || ipo.status === statusFilter;
              const matchSearch = ipo.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                  ipo.ticker.toLowerCase().includes(searchTerm.toLowerCase());
              return matchMarket && matchStatus && matchSearch;
            });
          }, [ipoData, marketFilter, statusFilter, searchTerm]);

          // 计算模拟逻辑
          const calculatorResults = useMemo(() => {
            const totalFinancing = calcPrincipal * calcLeverage;
            const actualLots = Math.min(calcLotsApplied, Math.floor(totalFinancing / calcPricePerLot));
            const actualSubValue = actualLots * calcPricePerLot;
            const borrowedAmount = Math.max(0, actualSubValue - calcPrincipal);
            const interestCost = (borrowedAmount * (calcInterestRate / 100) * calcInterestDays) / 365;
            const nonRefundableCost = (calcMarket === 'HK' ? calcSubFee : 0) + interestCost;
            const expectedLotsWon = (actualLots * (calcAllotmentRate / 100));
            const valueWon = expectedLotsWon * calcPricePerLot;
            const netProfit = (valueWon * (calcFirstDayGain / 100)) - nonRefundableCost;
            return {
              actualLots, actualSubValue, borrowedAmount,
              interestCost: interestCost.toFixed(2),
              nonRefundableCost: nonRefundableCost.toFixed(2),
              expectedLotsWon: expectedLotsWon.toFixed(2),
              valueWon: valueWon.toFixed(0),
              netProfit: netProfit.toFixed(2),
              roi: calcPrincipal > 0 ? ((netProfit / calcPrincipal) * 100).toFixed(2) : '0.00',
              breakEvenGain: valueWon > 0 ? ((nonRefundableCost / valueWon) * 100).toFixed(2) : '0.00'
            };
          }, [calcMarket, calcPrincipal, calcLeverage, calcSubFee, calcInterestRate, calcInterestDays, calcFirstDayGain, calcAllotmentRate, calcLotsApplied, calcPricePerLot]);

          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans">
              {toastMessage && <div className="fixed top-5 right-5 bg-emerald-600 text-white px-5 py-3 rounded-xl shadow-2xl z-50 font-bold">{toastMessage}</div>}

              {/* 头部面板 */}
              <header className="bg-slate-950/80 backdrop-blur border-b border-slate-800 sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-gradient-to-r from-indigo-500 to-indigo-600 text-white p-2.5 rounded-xl font-black">📈</div>
                    <div>
                      <h1 className="text-xl font-bold text-white">IPO 实时数据打新助手</h1>
                      <p className="text-xs text-slate-400">真实行情联动版 · 核心算法驱动数据中心</p>
                    </div>
                  </div>
                  
                  <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                    <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-1.5 rounded-lg text-xs font-semibold ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>📊 真实看板</button>
                    <button onClick={() => setActiveTab('calculator')} className={`px-4 py-1.5 rounded-lg text-xs font-semibold ${activeTab === 'calculator' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>🧮 模拟计算</button>
                  </div>
                </div>
              </header>

              {/* 📡 智联行情数据接入中心 */}
              {showSyncPanel && (
                <div className="bg-slate-950 border-b border-slate-800">
                  <div className="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div className="lg:col-span-5 flex flex-col gap-4 bg-slate-900/40 p-4 rounded-xl border border-slate-800">
                      
                      {/* 🔑 密钥配置输入框 */}
                      <div className="flex flex-col gap-1.5">
                        <label className="text-xs font-bold text-indigo-400">🔑 第一步：配置您的免费数据连接密钥 (API Key)</label>
                        <input
                          type="password"
                          value={customApiKey}
                          onChange={(e) => {
                            setCustomApiKey(e.target.value);
                            localStorage.setItem('gemini_api_key', e.target.value);
                          }}
                          placeholder="在此粘贴您的 Gemini 免费密钥 (AIzaSy...)"
                          className="w-full bg-slate-950 border border-slate-800 rounded-lg py-2 px-3 text-xs font-mono text-slate-200 focus:outline-none focus:border-indigo-500"
                        />
                        <p className="text-[10px] text-slate-500">此密钥纯本地保存，不会上传到云端，安全可靠。</p>
                      </div>

                      <div className="flex flex-col gap-2 pt-2 border-t border-slate-800">
                        <label className="text-xs font-bold text-slate-300">第二步：选择要接入的市场抓取实时行情</label>
                        <div className="grid grid-cols-3 gap-2">
                          <button onClick={() => runLiveSync('港股IPO')} disabled={isSyncing} className="bg-indigo-600 hover:bg-indigo-500 text-white py-2 px-1 rounded-lg text-xs font-bold disabled:opacity-50">🇭🇰 实时同步港股</button>
                          <button onClick={() => runLiveSync('A股新股')} disabled={isSyncing} className="bg-indigo-600 hover:bg-indigo-500 text-white py-2 px-1 rounded-lg text-xs font-bold disabled:opacity-50">🇨🇳 实时同步A股</button>
                          <button onClick={() => runLiveSync('美股IPO')} disabled={isSyncing} className="bg-indigo-600 hover:bg-indigo-500 text-white py-2 px-1 rounded-lg text-xs font-bold disabled:opacity-50">🇺🇸 实时同步美股</button>
                        </div>
                      </div>
                    </div>

                    <div className="lg:col-span-7 flex flex-col gap-2 bg-slate-950 rounded-xl p-4 border border-slate-800 font-mono text-[11px] text-teal-400 h-36 overflow-y-auto">
                      {syncLogs.length > 0 ? syncLogs.map((log, idx) => <div key={idx}>&gt; {log}</div>) : <div className="text-slate-500 italic m-auto">📡 等待激活真实全网行情数据流...</div>}
                    </div>
                  </div>
                </div>
              )}

              {/* 主体大盘面 */}
              <main className="flex-1 max-w-7xl w-full mx-auto p-4 flex flex-col gap-6">
                
                {activeTab === 'dashboard' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fadeIn">
                    
                    {/* 左侧列表 */}
                    <div className="lg:col-span-2 flex flex-col gap-4">
                      <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex flex-wrap gap-4 items-center justify-between">
                        <div className="flex gap-2">
                          {['ALL', 'HK', 'A', 'US'].map(m => (
                            <button key={m} onClick={() => setMarketFilter(m)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${marketFilter === m ? 'bg-indigo-600 text-white' : 'bg-slate-900 text-slate-400 border-slate-800'}`}>
                              {m === 'ALL' ? '全部市场' : m === 'HK' ? '🇭🇰 港股' : m === 'A' ? '🇨🇳 A股' : '🇺🇸 美股'}
                            </button>
                          ))}
                        </div>
                        <input type="text" placeholder="搜索名称/行业..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="bg-slate-900 border border-slate-800 rounded-lg text-xs text-slate-200 px-3 py-1.5 focus:outline-none w-full sm:w-48" />
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filteredIpoData.map(ipo => (
                          <div key={ipo.id} onClick={() => setSelectedIpo(ipo)} className={`bg-slate-950 p-5 rounded-xl border cursor-pointer transition-all ${selectedIpo.id === ipo.id ? 'border-indigo-500' : 'border-slate-800'}`}>
                            <div className="flex justify-between">
                              <div>
                                <span className="text-[10px] bg-slate-800 text-slate-300 px-2 py-0.5 rounded font-bold">{ipo.market} | {ipo.industry}</span>
                                <h3 className="text-base font-bold text-white mt-2">{ipo.name}</h3>
                                <p className="text-xs text-indigo-400 font-mono mt-0.5">{ipo.ticker}</p>
                              </div>
                              <span className="w-8 h-8 rounded bg-indigo-900/40 border border-indigo-500/30 text-white flex items-center justify-center font-black">{ipo.rating}</span>
                            </div>
                            <div className="mt-4 pt-4 border-t border-slate-900 grid grid-cols-2 gap-2 text-xs text-slate-400">
                              <div>定价/区间: <span className="text-white font-semibold">{ipo.priceRange}</span></div>
                              <div>最新超购: <span className="text-amber-400 font-semibold">{ipo.oversubscribed} 倍</span></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* 右侧深度剖析栏 + 📺 TradingView 真实走势行情图表 */}
                    <div className="lg:col-span-1">
                      {selectedIpo && (
                        <div className="bg-slate-950 p-6 rounded-xl border border-slate-800 flex flex-col gap-5 sticky top-24">
                          <div>
                            <h2 className="text-lg font-bold text-white">{selectedIpo.name}</h2>
                            <p className="text-xs text-indigo-400 font-mono mt-0.5">{selectedIpo.ticker} 行情诊断</p>
                          </div>

                          {/* 📺 真实走势图集成（根据所选新股代码动态变换） */}
                          <div className="bg-slate-900 rounded-xl p-3 border border-slate-800">
                            <span className="text-[11px] font-bold text-slate-400 block mb-2">📊 真实市场K线及技术面图表 (由 TradingView 驱动)</span>
                            <iframe 
                              src={`https://s.tradingview.com/widgetembed/?frameElementId=tradingview_chart&symbol=${
                                selectedIpo.ticker.endsWith('.SH') ? 'SSE:' + selectedIpo.ticker.replace('.SH','') :
                                selectedIpo.ticker.endsWith('.SZ') ? 'SZSE:' + selectedIpo.ticker.replace('.SZ','') :
                                selectedIpo.ticker.endsWith('.HK') ? 'HKEX:' + parseInt(selectedIpo.ticker.replace('.HK','')) :
                                selectedIpo.ticker.replace('.US','')
                              }&interval=D&hidesidetoolbar=1&symboledit=0&saveimage=1&toolbarbg=f1f3f6&studies=%5B%5D&theme=dark&style=1&timezone=Asia%2FShanghai&studies_overrides=%7B%7D&overrides=%7B%7D&enabled_features=%5B%5D&disabled_features=%5B%5D&locale=zh_CN`}
                              width="100%" 
                              height="220" 
                              frameBorder="0" 
                              allowTransparency="true" 
                              scrolling="no" 
                              allowFullScreen
                              className="rounded-lg"
                            ></iframe>
                          </div>

                          <div className="space-y-2 text-xs text-slate-300">
                            <div className="bg-slate-900 p-2.5 rounded flex justify-between"><span>🤝 顶级保荐人:</span><span className="font-bold text-white">{selectedIpo.sponsor}</span></div>
                            <div className="bg-slate-900 p-2.5 rounded flex justify-between"><span>💎 基石阵容:</span><span className="font-bold text-white truncate max-w-[160px]">{selectedIpo.cornerstones}</span></div>
                            <div className="bg-slate-900 p-2.5 rounded flex justify-between"><span>📈 动态估值 PE:</span><span className="font-bold text-white">{selectedIpo.valuationPE} 倍</span></div>
                          </div>

                          <div className="bg-indigo-950/20 border border-indigo-900/30 p-4 rounded-xl text-xs text-slate-300">
                            <span className="font-bold text-indigo-400 block mb-1">💡 机构分析报告</span>
                            {selectedIpo.summary}
                          </div>
                        </div>
                      )}
                    </div>

                  </div>
                )}

                {/* 盈亏模拟计算卡 */}
                {activeTab === 'calculator' && (
                  <div className="bg-slate-950 p-6 rounded-xl border border-slate-800 grid grid-cols-1 md:grid-cols-2 gap-6 animate-fadeIn">
                    <div className="flex flex-col gap-4 bg-slate-900/40 p-5 rounded-xl border border-slate-800">
                      <h3 className="text-sm font-bold text-indigo-400">调节测算指标</h3>
                      <div className="space-y-3 text-xs">
                        <div><label className="block text-slate-400 mb-1">账户本金 ({calcMarket}):</label><input type="number" value={calcPrincipal} onChange={e=>setCalcPrincipal(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white" /></div>
                        <div><label className="block text-slate-400 mb-1">每手金额 / 中签配额面值:</label><input type="number" value={calcPricePerLot} onChange={e=>setCalcPricePerLot(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white" /></div>
                        <div><label className="block text-slate-400 mb-1">预估中签率 %:</label><input type="number" value={calcAllotmentRate} onChange={e=>setCalcAllotmentRate(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white" /></div>
                        <div><label className="block text-slate-400 mb-1">预期开盘首日涨幅 %:</label><input type="number" value={calcFirstDayGain} onChange={e=>setCalcFirstDayGain(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white" /></div>
                      </div>
                    </div>
                    <div className="bg-slate-900 p-6 rounded-xl border border-slate-800 flex flex-col justify-between">
                      <h3 className="text-sm font-bold text-white border-b border-slate-800 pb-2">盈亏精算报告</h3>
                      <div className="space-y-2 text-xs text-slate-400 mt-4">
                        <div className="flex justify-between"><span>预计获配股持仓额:</span><span className="text-white font-mono">{calculatorResults.valueWon}</span></div>
                        <div className="flex justify-between"><span>资金硬性沉没成本:</span><span className="text-rose-400 font-mono">{calculatorResults.nonRefundableCost}</span></div>
                        <div className="flex justify-between"><span>保本平衡涨幅界限:</span><span className="text-amber-400 font-mono">{calculatorResults.breakEvenGain}%</span></div>
                      </div>
                      <div className="border-t border-slate-800 pt-6 mt-6 flex justify-between items-center">
                        <div><span className="text-xs text-slate-500 block">测算最终净利润</span><span className={`text-2xl font-black font-mono ${Number(calculatorResults.netProfit) >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>{Number(calculatorResults.netProfit) >= 0 ? '+' : ''}{calculatorResults.netProfit}</span></div>
                        <div className="bg-slate-950 px-3 py-1.5 rounded border border-slate-800 text-right"><span className="text-[10px] text-slate-500 block">预计回报率 ROI</span><span className="text-emerald-400 font-bold font-mono">{calculatorResults.roi}%</span></div>
                      </div>
                    </div>
                  </div>
                )}

              </main>

              <footer className="bg-slate-950 border-t border-slate-900 py-4 text-center text-[10px] text-slate-500 mt-auto">
                 © 2026 IPO 实时打新投研助手 · 真实大盘行情联动版 · 投资有破发风险，参与须极度谨慎。
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
