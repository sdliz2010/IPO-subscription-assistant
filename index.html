<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPO 打新助手</title>
    <!-- 1. 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 2. 引入 Babel（解析 JSX 语法） -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 3. 引入 Tailwind CSS（网页样式） -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- 网页挂载容器 -->
    <div id="root"></div>

    <script type="text/babel">
        // 声明常用的 React Hook
        const { useState, useMemo, useEffect } = React;

        // 大盘基础数据模板
        const INITIAL_IPO_DATA = [
          {
            id: 'a-1',
            name: '长鑫科技 (ChangXin DRAM)',
            ticker: '688825.SH',
            market: 'A',
            industry: '半导体 / 存储芯片',
            priceRange: '8.66 CNY',
            minEntry: '4,330 CNY (500股/配号)',
            status: 'subscription', 
            endDate: '2026-07-23',
            listDate: '2026-07-31',
            oversubscribed: 852.4,
            cornerstones: '大基金三期, 合肥国资 (占比 45.0%)',
            sponsor: '中信证券, 中金公司',
            sponsorSuccessRate: 95, 
            rating: 'S',
            valuationPE: 28.4,
            freezeDays: 8,
            summary: '科创板史上最大IPO！国内DRAM存储芯片绝对龙头，拟募资数百亿元，获大基金三期大力注资。'
          },
          {
            id: 'a-2',
            name: '托伦斯精密 (Toron Semi)',
            ticker: '301583.SZ',
            market: 'A',
            industry: '半导体零部件 / 精密制造',
            priceRange: '18.20 CNY',
            minEntry: '9,100 CNY (500股/配号)',
            status: 'listed',
            endDate: '2026-07-06',
            listDate: '2026-07-10',
            oversubscribed: 1450.0,
            cornerstones: '无公开基石 (A股常规发行)',
            sponsor: '华泰联合证券',
            sponsorSuccessRate: 91,
            rating: 'S',
            valuationPE: 21.5,
            freezeDays: 4,
            firstDayPerformance: 450.0,
            summary: '近期半导体精密零部件明星新股。上市首日爆发式飙升盘中涨幅超10倍。'
          },
          {
            id: 'hk-1',
            name: 'Momenta 自动驾驶 (Momenta-W)',
            ticker: '06880.HK',
            market: 'HK',
            industry: '自动驾驶 / AI算法',
            priceRange: '295.60 HKD',
            minEntry: '5,912 HKD (20股/手)',
            status: 'subscription',
            endDate: '2026-07-25',
            listDate: '2026-07-31',
            oversubscribed: 42.8,
            cornerstones: '上汽集团, 奔驰, 腾讯控股 (占比 52.3%)',
            sponsor: '中金公司, 高盛, 瑞银',
            sponsorSuccessRate: 85,
            rating: 'A',
            valuationPE: 42.5,
            freezeDays: 6,
            summary: '中国头部自动驾驶独角兽。获汽车产业巨头及科技巨头深度联手基石认购。'
          },
          {
            id: 'hk-2',
            name: '晶合集成 (Nexchip HK)',
            ticker: '02249.HK',
            market: 'HK',
            industry: '晶圆代工 / 半导体',
            priceRange: '32.30 HKD',
            minEntry: '6,460 HKD (200股/手)',
            status: 'listed',
            endDate: '2026-07-05',
            listDate: '2026-07-10',
            oversubscribed: 15.6,
            cornerstones: '合肥建投, 集创北方 (占比 38.0%)',
            sponsor: '国泰君安国际',
            sponsorSuccessRate: 72,
            rating: 'B',
            valuationPE: 18.2,
            freezeDays: 5,
            firstDayPerformance: 0.0,
            summary: '已上市。半导体成熟制程晶圆代工。由于行业估值基本合理，溢价受限。'
          }
        ];

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard'); 
          const [marketFilter, setMarketFilter] = useState('ALL'); 
          const [searchTerm, setSearchTerm] = useState('');
          const [ipoData, setIpoData] = useState(INITIAL_IPO_DATA);
          const [selectedIpo, setSelectedIpo] = useState(INITIAL_IPO_DATA[0]);
          const [toastMessage, setToastMessage] = useState(null);

          // 行情同步状态
          const [isSyncing, setIsSyncing] = useState(false);
          const [syncLogs, setSyncLogs] = useState([]);

          // 计算模拟器状态
          const [calcMarket, setCalcMarket] = useState('HK'); 
          const [calcPrincipal, setCalcPrincipal] = useState(50000); 
          const [calcLeverage, setCalcLeverage] = useState(10); 
          const [calcSubFee, setCalcSubFee] = useState(100); 
          const [calcInterestRate, setCalcInterestRate] = useState(3.8); 
          const [calcInterestDays, setCalcInterestDays] = useState(6); 
          const [calcFirstDayGain, setCalcFirstDayGain] = useState(25); 
          const [calcAllotmentRate, setCalcAllotmentRate] = useState(20); 
          const [calcLotsApplied, setCalcLotsApplied] = useState(10); 
          const [calcPricePerLot, setCalcPricePerLot] = useState(4000); 

          const showToast = (msg) => {
            setToastMessage(msg);
            setTimeout(() => setToastMessage(null), 3500);
          };

          // 📡 核心升级：免密码、零限制直连交易所真实行情流
          const fetchRealTimePrices = async () => {
            setIsSyncing(true);
            setSyncLogs([
              "🔄 正在初始化无门槛金融行情网关...",
              "🔍 正在为个股映射交易所标准代码...",
              "🌐 正在通过 AllOrigins 绿色信道连接腾讯财经实时行情服务器..."
            ]);

            try {
              // 将我们列表里的股票代码转换成腾讯接口认识的格式
              const codeMap = {
                '688825.SH': 'sh688825',
                '301583.SZ': 'sz301583',
                '06880.HK': 'hk06880',
                '02249.HK': 'hk02249'
              };

              const codes = Object.values(codeMap).join(',');
              const targetUrl = `https://qt.gtimg.cn/q=s_${codes}`;
              
              // 使用免费的公网代理，完美绕过浏览器的跨域拦截
              const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
              
              setSyncLogs(prev => [...prev, `📡 正在向行情中心发送报文群询...`]);
              
              const res = await fetch(proxyUrl);
              const json = await res.json();
              const rawResponseText = json.contents;
              
              if (!rawResponseText) throw new Error("行情服务器响应空报文");

              setSyncLogs(prev => [...prev, "📥 成功拦截最新交易所原始数据，正在执行解析重组..."]);

              const lines = rawResponseText.split(';');
              const priceUpdates = {};

              lines.forEach(line => {
                if (!line.trim()) return;
                // 解析形如：v_s_sh688825="1~长鑫科技~688825~8.66~0.05~0.58~..." 的字符串
                const match = line.match(/v_s_(s[hz]\d+|hk\d+)="([^"]+)"/);
                if (match) {
                  const tencentCode = match[1];
                  const dataParts = match[2].split('~');
                  const currentPrice = dataParts[3]; // 最新价
                  const changePercent = dataParts[5]; // 今日涨跌幅 (%)
                  priceUpdates[tencentCode] = { currentPrice, changePercent };
                }
              });

              // 将真实的实时股价和涨跌幅刷入 React 页面中
              setIpoData(prev => prev.map(ipo => {
                const tCode = codeMap[ipo.ticker];
                if (tCode && priceUpdates[tCode]) {
                  return {
                    ...ipo,
                    priceRange: `${priceUpdates[tCode].currentPrice} ${ipo.market === 'HK' ? 'HKD' : 'CNY'} (最新价)`,
                    // 如果已经上市，直接同步市场真实的今日涨跌幅
                    firstDayPerformance: ipo.status === 'listed' ? parseFloat(priceUpdates[tCode].changePercent) : ipo.firstDayPerformance
                  };
                }
                return ipo;
              }));

              setSyncLogs(prev => [
                ...prev, 
                `✅ 成功提取 A 股/港股最新现价数据！`,
                "🎉 页面核心看板数据已完成真实行情注入。"
              ]);
              showToast("⚡ 交易所真实行情实时同步成功！");

            } catch (err) {
              setSyncLogs(prev => [...prev, `❌ 行情拉取失败: ${err.message}`, "⚠️ 请稍后重试，系统自动保留本地投研骨架数据。"]);
              showToast("行情同步失败，请检查网络");
            }
            setIsSyncing(false);
          };

          // 初次加载网页时，自动去拉一次真实行情
          useEffect(() => {
            fetchRealTimePrices();
          }, []);

          const filteredIpoData = useMemo(() => {
            return ipoData.filter((ipo) => {
              const matchMarket = marketFilter === 'ALL' || ipo.market === marketFilter;
              const matchSearch = ipo.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                  ipo.ticker.toLowerCase().includes(searchTerm.toLowerCase());
              return matchMarket && matchSearch;
            });
          }, [ipoData, marketFilter, searchTerm]);

          const calculatorResults = useMemo(() => {
            const totalFinancing = calcPrincipal * calcLeverage;
            const actualLots = Math.min(calcLotsApplied, Math.floor(totalFinancing / calcPricePerLot));
            const actualSubValue = actualLots * calcPricePerLot;
            const borrowedAmount = Math.max(0, actualSubValue - calcPrincipal);
            const interestCost = (borrowedAmount * (calcInterestRate / 100) * calcInterestDays) / 365;
            const nonRefundableCost = (calcMarket === 'HK' ? calcSubFee : 0) + interestCost;
            const valueWon = (actualLots * (calcAllotmentRate / 100)) * calcPricePerLot;
            const netProfit = (valueWon * (calcFirstDayGain / 100)) - nonRefundableCost;
            return {
              actualLots, actualSubValue, borrowedAmount,
              interestCost: interestCost.toFixed(2),
              nonRefundableCost: nonRefundableCost.toFixed(2),
              valueWon: valueWon.toFixed(0),
              netProfit: netProfit.toFixed(2),
              roi: calcPrincipal > 0 ? ((netProfit / calcPrincipal) * 100).toFixed(2) : '0.00',
              breakEvenGain: valueWon > 0 ? ((nonRefundableCost / valueWon) * 100).toFixed(2) : '0.00'
            };
          }, [calcMarket, calcPrincipal, calcLeverage, calcSubFee, calcInterestRate, calcInterestDays, calcFirstDayGain, calcAllotmentRate, calcLotsApplied, calcPricePerLot]);

          return (
            <div className="min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans">
              {toastMessage && <div className="fixed top-5 right-5 bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-5 py-3 rounded-xl shadow-2xl z-50 font-bold border border-emerald-400/20">{toastMessage}</div>}

              {/* 导航面板 */}
              <header className="bg-slate-950/80 backdrop-blur border-b border-slate-800 sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-indigo-600 text-white p-2.5 rounded-xl font-bold text-lg shadow-lg shadow-indigo-600/20">🚀</div>
                    <div>
                      <h1 className="text-xl font-bold text-white tracking-tight">IPO 打新数据同步助手</h1>
                      <p className="text-xs text-slate-400 mt-0.5">直连国内/香港交易所数据源 · 免密真实行情接入版</p>
                    </div>
                  </div>
                  
                  <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                    <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}>📊 市场看板</button>
                    <button onClick={() => setActiveTab('calculator')} className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-all ${activeTab === 'calculator' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}>🧮 杠杆精算模拟</button>
                  </div>
                </div>
              </header>

              {/* 控制台日志 */}
              <div className="bg-slate-950 border-b border-slate-800/60">
                <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row gap-4 justify-between items-stretch md:items-center">
                  <div className="flex-1 bg-slate-900/50 rounded-xl p-3 border border-slate-800 font-mono text-[11px] text-teal-400 max-h-[70px] overflow-y-auto space-y-1">
                    {syncLogs.map((log, idx) => <div key={idx}>&gt; {log}</div>)}
                  </div>
                  <button 
                    onClick={fetchRealTimePrices} 
                    disabled={isSyncing}
                    className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-5 py-3 rounded-xl shadow-md shrink-0 flex items-center justify-center gap-1.5 disabled:opacity-50 transition-colors"
                  >
                    {isSyncing ? "正在获取中..." : "⚡ 刷新实时行情数据"}
                  </button>
                </div>
              </div>

              {/* 核心大盘 */}
              <main className="flex-1 max-w-7xl w-full mx-auto p-4 flex flex-col gap-6">
                
                {activeTab === 'dashboard' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fadeIn">
                    
                    {/* 左侧卡片列表 */}
                    <div className="lg:col-span-2 flex flex-col gap-4">
                      <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex flex-col sm:flex-row gap-4 items-center justify-between">
                        <div className="flex gap-2">
                          {['ALL', 'HK', 'A'].map(m => (
                            <button key={m} onClick={() => setMarketFilter(m)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${marketFilter === m ? 'bg-indigo-600 text-white border-indigo-500' : 'bg-slate-900 text-slate-400 border-slate-800'}`}>
                              {m === 'ALL' ? '全部市场' : m === 'HK' ? '🇭🇰 港股新股' : '🇨🇳 A股打新'}
                            </button>
                          ))}
                        </div>
                        <input type="text" placeholder="快速搜索个股名称或代码..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="bg-slate-900 border border-slate-800 rounded-lg text-xs text-slate-200 px-3 py-1.5 focus:outline-none focus:border-indigo-500 w-full sm:w-60" />
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filteredIpoData.map(ipo => (
                          <div key={ipo.id} onClick={() => setSelectedIpo(ipo)} className={`bg-slate-950 p-5 rounded-2xl border transition-all cursor-pointer hover:border-slate-700 ${selectedIpo.id === ipo.id ? 'border-indigo-500 ring-1 ring-indigo-500/20' : 'border-slate-800'}`}>
                            <div className="flex justify-between items-start">
                              <div>
                                <span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold ${ipo.market === 'HK' ? 'bg-red-500/10 text-red-400' : 'bg-blue-500/10 text-blue-400'}`}>{ipo.market === 'HK' ? '港股配售' : 'A股科创板'}</span>
                                <h3 className="text-base font-bold text-white mt-2">{ipo.name}</h3>
                                <p className="text-xs text-indigo-400 font-mono mt-0.5">{ipo.ticker}</p>
                              </div>
                              <span className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-indigo-600 text-white flex items-center justify-center font-black text-xs shadow-md">{ipo.rating}级</span>
                            </div>
                            <div className="mt-4 pt-4 border-t border-slate-900/80 grid grid-cols-2 gap-3 text-xs">
                              <div><p className="text-slate-500">最新盘面状态</p><p className="font-semibold text-slate-200 mt-0.5">{ipo.priceRange}</p></div>
                              <div><p className="text-slate-500">超额认购水平</p><p className="font-bold text-amber-400 mt-0.5">{ipo.oversubscribed} 倍</p></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* 右侧：个股深度诊断 + 📺 TradingView 免费行情走势图 */}
                    <div className="lg:col-span-1">
                      {selectedIpo && (
                        <div className="bg-slate-950 p-6 rounded-2xl border border-slate-800 flex flex-col gap-5 sticky top-24 shadow-xl">
                          <div>
                            <h2 className="text-lg font-bold text-white tracking-tight">{selectedIpo.name}</h2>
                            <p className="text-xs text-indigo-400 font-mono mt-0.5">{selectedIpo.ticker} 数据终端</p>
                          </div>

                          {/* 📺 交易所实时日线走势图（全球直连，不受地域限制） */}
                          <div className="bg-slate-900 rounded-xl p-3 border border-slate-800">
                            <span className="text-[11px] font-bold text-slate-400 block mb-2">📊 真实市场K线及技术面图表 (由 TradingView 驱动)</span>
                            <iframe 
                              src={`https://s.tradingview.com/widgetembed/?frameElementId=tradingview_chart&symbol=${
                                selectedIpo.ticker.endsWith('.SH') ? 'SSE:' + selectedIpo.ticker.replace('.SH','') :
                                selectedIpo.ticker.endsWith('.SZ') ? 'SZSE:' + selectedIpo.ticker.replace('.SZ','') :
                                'HKEX:' + parseInt(selectedIpo.ticker.replace('.HK',''))
                              }&interval=D&hidesidetoolbar=1&symboledit=0&saveimage=0&toolbarbg=f1f3f6&theme=dark&style=1&timezone=Asia%2FShanghai&locale=zh_CN`}
                              width="100%" 
                              height="200" 
                              frameBorder="0" 
                              allowTransparency="true" 
                              scrolling="no" 
                              allowFullScreen
                              className="rounded-lg"
                            ></iframe>
                          </div>

                          <div className="space-y-2 text-xs">
                            <div className="bg-slate-900/60 p-2.5 rounded border border-slate-900 flex justify-between">
                              <span className="text-slate-400">🤝 联席保荐人</span>
                              <span className="font-bold text-slate-200 truncate max-w-[150px]">{selectedIpo.sponsor}</span>
                            </div>
                            <div className="bg-slate-900/60 p-2.5 rounded border border-slate-900 flex justify-between">
                              <span className="text-slate-400">💎 基石阵营</span>
                              <span className="font-bold text-slate-200 truncate max-w-[150px]">{selectedIpo.cornerstones}</span>
                            </div>
                            <div className="bg-slate-900/60 p-2.5 rounded border border-slate-900 flex justify-between">
                              <span className="text-slate-400">今日上市表现/变动</span>
                              <span className={`font-bold font-mono ${selectedIpo.firstDayPerformance > 0 ? 'text-emerald-400' : selectedIpo.firstDayPerformance < 0 ? 'text-rose-500' : 'text-slate-400'}`}>
                                {selectedIpo.firstDayPerformance > 0 ? '+' : ''}{selectedIpo.firstDayPerformance}%
                              </span>
                            </div>
                          </div>

                          <div className="bg-indigo-950/20 border border-indigo-900/30 p-4 rounded-xl text-xs text-slate-300 leading-relaxed">
                            <span className="font-bold text-indigo-400 block mb-1">💡 机构配置诊断</span>
                            {selectedIpo.summary}
                          </div>
                        </div>
                      )}
                    </div>

                  </div>
                )}

                {/* 模拟精算计算卡 */}
                {activeTab === 'calculator' && (
                  <div className="bg-slate-950 p-6 rounded-2xl border border-slate-800 grid grid-cols-1 md:grid-cols-2 gap-8 animate-fadeIn">
                    <div className="flex flex-col gap-4 bg-slate-900/40 p-5 rounded-xl border border-slate-800">
                      <h3 className="text-sm font-bold text-indigo-400 uppercase tracking-wider">一、调节测算指标</h3>
                      <div className="space-y-4 text-xs">
                        <div><label className="block text-slate-400 mb-1.5 font-medium">账户本金金额 ({calcMarket}):</label><input type="number" value={calcPrincipal} onChange={e=>setCalcPrincipal(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-white font-mono" /></div>
                        <div><label className="block text-slate-400 mb-1.5 font-medium">每手新股面值 / 中签配额面值:</label><input type="number" value={calcPricePerLot} onChange={e=>setCalcPricePerLot(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-white font-mono" /></div>
                        <div><label className="block text-slate-400 mb-1.5 font-medium">预估中签概率 % (多户/孖展):</label><input type="number" value={calcAllotmentRate} onChange={e=>setCalcAllotmentRate(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-white font-mono" /></div>
                        <div><label className="block text-slate-400 mb-1.5 font-medium">预期开盘首日涨幅/暗盘溢价 %:</label><input type="number" value={calcFirstDayGain} onChange={e=>setCalcFirstDayGain(Number(e.target.value))} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-white font-mono" /></div>
                      </div>
                    </div>
                    
                    <div className="bg-slate-900 p-6 rounded-xl border border-slate-800 flex flex-col justify-between">
                      <div>
                        <h3 className="text-sm font-bold text-white border-b border-slate-800 pb-2 uppercase tracking-wider">二、盈亏高精精算报告</h3>
                        <div className="space-y-3 text-xs text-slate-400 mt-4">
                          <div className="flex justify-between"><span>预计加权中签货值:</span><span className="text-slate-200 font-mono font-bold">¥ {calculatorResults.valueWon}</span></div>
                          <div className="flex justify-between"><span>硬性沉没利息与认购费成本:</span><span className="text-rose-400 font-mono font-bold">¥ {calculatorResults.nonRefundableCost}</span></div>
                          <div className="flex justify-between"><span>多户打法保本所需平衡涨幅界限:</span><span className="text-amber-400 font-mono font-bold">{calculatorResults.breakEvenGain} %</span></div>
                        </div>
                      </div>
